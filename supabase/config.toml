# PlaySplit local Supabase config
project_id = "playsplit"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

# Local dev: surface the 6-digit OTP code in the email so it can be entered in-app.
[auth.email.template.magic_link]
subject = "Your PlaySplit sign-in code"
content_path = "./supabase/templates/magic_link.html"

# Phone OTP (PRD §25) — provider configured via env in real deploys.
[auth.sms]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"
